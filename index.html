<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tracker Paliwa</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #232736;
    --accent: #e8c84a;
    --accent2: #4a9ee8;
    --diesel: #e8c84a;
    --unleaded: #4a9ee8;
    --super: #e87a4a;
    --text: #e8eaf0;
    --muted: #6b7190;
    --green: #4ae8a0;
    --red: #e84a6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-title span { color: var(--accent); }
  .tab-bar {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px;
  }
  .tab {
    padding: 7px 16px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* Main */
  .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    letter-spacing: -0.02em;
  }
  .stat-value.gold { color: var(--accent); }
  .stat-value.blue { color: var(--accent2); }
  .stat-value.green { color: var(--green); }

  /* Table section */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }
  .btn-add {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.2s;
  }
  .btn-add:hover { opacity: 0.85; }

  /* Table */
  .table-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead th {
    background: var(--surface2);
    padding: 11px 14px;
    text-align: left;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td {
    padding: 11px 14px;
    font-size: 0.82rem;
    white-space: nowrap;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 5px;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .badge-diesel { background: rgba(232,200,74,0.15); color: var(--diesel); }
  .badge-unleaded { background: rgba(74,158,232,0.15); color: var(--unleaded); }
  .badge-super { background: rgba(232,122,74,0.15); color: var(--super); }
  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s;
  }
  .delete-btn:hover { color: var(--red); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.2rem;
    cursor: pointer;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .form-input, .form-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-select option { background: var(--surface2); }
  .btn-submit {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    padding: 11px;
    width: 100%;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 18px;
    transition: opacity 0.2s;
  }
  .btn-submit:hover { opacity: 0.85; }

  /* Budget section */
  .budget-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
    margin-top: 16px;
  }
  .budget-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .budget-month {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .budget-amount {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--accent);
  }

  /* Budget totals */
  .budget-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .bsum-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .bsum-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .bsum-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.4rem; }

  /* Page views */
  .page { display: none; }
  .page.active { display: block; }

  /* Fuel filter */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,200,74,0.08); }

  @media (max-width: 600px) {
    .header { flex-direction: column; gap: 12px; align-items: flex-start; }
    .form-grid { grid-template-columns: 1fr; }
    .main { padding: 16px; }
  }

  /* Lock Screen styling */
  .lock-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s ease;
  }
  .lock-card {
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 30px;
    border-radius: 20px;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }
  .lock-icon {
    font-size: 2.2rem;
    margin-bottom: 12px;
  }
  .lock-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 20px;
    color: var(--text);
  }
  .pin-dots {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 25px;
  }
  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid var(--border);
    transition: background 0.15s, border-color 0.15s;
  }
  .dot.active {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(232, 200, 74, 0.4);
  }
  .pin-keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    justify-items: center;
    margin: 0 auto;
    max-width: 240px;
  }
  .key-btn {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 1.25rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .key-btn:active {
    background: var(--border);
    transform: scale(0.92);
  }
  .key-btn.empty {
    background: transparent;
    border: none;
    cursor: default;
  }
  .key-btn.delete {
    font-size: 1rem;
    border: none;
    background: transparent;
  }
  .lock-error {
    color: var(--red);
    font-size: 0.75rem;
    margin-top: 18px;
    visibility: hidden;
    height: 1rem;
  }
  .lock-card.shake {
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }
</style>
</head>
<body>

<!-- Lock Screen Overlay -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">Tracker Paliwa</div>
    <div class="pin-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="pin-keypad">
      <button class="key-btn" onclick="pressKey(1)">1</button>
      <button class="key-btn" onclick="pressKey(2)">2</button>
      <button class="key-btn" onclick="pressKey(3)">3</button>
      <button class="key-btn" onclick="pressKey(4)">4</button>
      <button class="key-btn" onclick="pressKey(5)">5</button>
      <button class="key-btn" onclick="pressKey(6)">6</button>
      <button class="key-btn" onclick="pressKey(7)">7</button>
      <button class="key-btn" onclick="pressKey(8)">8</button>
      <button class="key-btn" onclick="pressKey(9)">9</button>
      <button class="key-btn empty"></button>
      <button class="key-btn" onclick="pressKey(0)">0</button>
      <button class="key-btn delete" onclick="deleteKey()">⌫</button>
    </div>
    <div class="lock-error" id="lock-error">Nieprawidłowy PIN</div>
  </div>
</div>

<div class="header">
  <div class="header-title">⛽ <span>Fuel</span>Tracker</div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchPage('tankowania', this)">Tankowania</button>
    <button class="tab" onclick="switchPage('budzet', this)">Budżet</button>
  </div>
</div>

<div class="main">

  <div class="page active" id="page-tankowania">
    <div class="stats-row" id="stats-row"></div>
    <div class="section-header">
      <div class="section-title">Historia tankowań</div>
      <button class="btn-add" onclick="openModal()">＋ Dodaj tankowanie</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">Wszystkie</button>
      <button class="filter-btn" onclick="setFilter('DIESEL', this)">Diesel</button>
      <button class="filter-btn" onclick="setFilter('pb95', this)">PB95</button>
      <button class="filter-btn" onclick="setFilter('pb98', this)">PB98</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Stacja</th>
            <th>Rodzaj paliwa</th>
            <th>Litry</th>
            <th>Kwota (EUR)</th>
            <th>€/L</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="fuel-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="page" id="page-budzet">
    <div class="budget-summary" id="budget-summary"></div>
    <div class="section-header">
      <div class="section-title">Miesięczny budżet</div>
      <div style="display:flex;gap:8px"><button class="btn-add" onclick="initBudget()" style="background:var(--accent2)">⚡ Inicjuj budżet</button><button class="btn-add" onclick="openBudgetModal()">＋ Dodaj miesiąc</button></div>
    </div>
    <div class="budget-grid" id="budget-grid"></div>
  </div>

</div>

<div class="modal-overlay" id="fuel-modal">
  <div class="modal">
    <div class="modal-title">
      Nowe tankowanie
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Data</label>
        <input type="date" class="form-input" id="f-date">
      </div>
      <div class="form-group">
        <label class="form-label">Godzina</label>
        <input type="time" class="form-input" id="f-time">
      </div>
      <div class="form-group full">
        <label class="form-label">Nazwa stacji</label>
        <input type="text" class="form-input" id="f-station" placeholder="np. 9652ZAVENTEN">
      </div>
      <div class="form-group">
        <label class="form-label">Rodzaj paliwa</label>
        <select class="form-select" id="f-product">
          <option value="DIESEL">DIESEL</option>
          <option value="pb95">PB95</option>
          <option value="pb98">PB98</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Ilość (L)</label>
        <input type="number" step="0.01" class="form-input" id="f-liters" placeholder="0.00" oninput="calcPrice()">
      </div>
      <div class="form-group">
        <label class="form-label">Kwota (EUR)</label>
        <input type="number" step="0.01" class="form-input" id="f-amount" placeholder="0.00" oninput="calcPriceFromAmount()">
      </div>
      <div class="form-group">
        <label class="form-label">Cena za litr (EUR)</label>
        <input type="number" step="0.001" class="form-input" id="f-ppl" placeholder="0.000" readonly style="opacity:0.6">
      </div>
    </div>
    <button class="btn-submit" onclick="saveFuel()">Zapisz tankowanie</button>
  </div>
</div>

<div class="modal-overlay" id="budget-modal">
  <div class="modal">
    <div class="modal-title">
      Dodaj/edytuj miesiąc
      <button class="modal-close" onclick="closeBudgetModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group full">
        <label class="form-label">Miesiąc (MM/RR)</label>
        <input type="text" class="form-input" id="b-month" placeholder="np. 05/26">
      </div>
      <div class="form-group full">
        <label class="form-label">Kwota (EUR)</label>
        <input type="number" step="1" class="form-input" id="b-amount" placeholder="100">
      </div>
    </div>
    <button class="btn-submit" onclick="saveBudget()">Zapisz</button>
  </div>
</div>

<script>
// ---- LINK DO TWOJEJ CHMURY (GOOGLE SHEETS) ----
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAiL4F00B8be9B5vMJbkQDuQ3tY9RIOVvtUX_xW7B589cdBiX-tzbmrrOMNqjjbMeJ/exec";

// ---- CONFIG BEZPIECZEŃSTWA (KOD PIN W CHMURZE) ----
let enteredPin = "";
let correctPin = sessionStorage.getItem('fuel_tracker_pin') || "";

function updatePinDots() {
  const dots = document.querySelectorAll('.dot');
  dots.forEach((dot, index) => {
    if (index < enteredPin.length) {
      dot.classList.add('active');
    } else {
      dot.classList.remove('active');
    }
  });
}

function pressKey(num) {
  if (enteredPin.length < 4) {
    enteredPin += num;
    updatePinDots();
    document.getElementById('lock-error').style.visibility = 'hidden';
    
    if (enteredPin.length === 4) {
      setTimeout(verifyPin, 150);
    }
  }
}

function deleteKey() {
  if (enteredPin.length > 0) {
    enteredPin = enteredPin.slice(0, -1);
    updatePinDots();
  }
}

async function verifyPin() {
  try {
    const res = await fetch(SCRIPT_URL + '?action=verify_pin&pin=' + enteredPin);
    const result = await res.json();
    if (result.status === "success") {
      correctPin = enteredPin;
      sessionStorage.setItem('fuel_tracker_pin', correctPin);
      unlockApp();
      syncWithCloud();
    } else {
      throw new Error("Błędny PIN");
    }
  } catch (err) {
    const card = document.querySelector('.lock-card');
    card.classList.add('shake');
    document.getElementById('lock-error').style.visibility = 'visible';
    enteredPin = "";
    updatePinDots();
    
    setTimeout(() => {
      card.classList.remove('shake');
    }, 400);
  }
}

function unlockApp() {
  const lockScreen = document.getElementById('lock-screen');
  if (lockScreen) {
    lockScreen.style.opacity = '0';
    setTimeout(() => {
      lockScreen.style.display = 'none';
    }, 300);
  }
}

// Obsługa klawiatury fizycznej na PC
window.addEventListener('keydown', e => {
  const lockScreen = document.getElementById('lock-screen');
  if (!lockScreen || lockScreen.style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') {
    pressKey(e.key);
  } else if (e.key === 'Backspace') {
    deleteKey();
  }
});

// Automatyczne odblokowanie jeśli już odblokowano w tej sesji
if (correctPin) {
  const lockScreen = document.getElementById('lock-screen');
  if (lockScreen) lockScreen.style.display = 'none';
}

// Load from localStorage or use defaults
let fuelData = JSON.parse(localStorage.getItem('fuelData') || '[]');
let budgetData = JSON.parse(localStorage.getItem('budgetData') || '[]');

// NORMALIZACJA NAZW PRODUKTÓW
function normalizeProduct(p) {
  if (p === 'UNLEADED') return 'pb95';
  if (p === 'SUPER UNLEADED') return 'pb98';
  return p || '';
}

// FUNKCJE DO CZYSZCZENIA BŁĘDNYCH DAT Z GOOGLE SHEETS
function formatTime(t) {
  if(!t || t === 'undefined' || t === 'null') return "";
  t = String(t);
  if(t.includes('T')) return t.split('T')[1].substring(0, 5);
  return t.substring(0, 5);
}

fuelData = fuelData.map(f => {
  f.product = normalizeProduct(f.product);
  f.time = formatTime(f.time);
  if (f.date && f.date.includes('T')) f.date = f.date.split('T')[0];
  return f;
});

let nextId = Math.max(...fuelData.map(f => f.id), 0) + 1;
let activeFilter = 'all';

function saveLocally() {
  localStorage.setItem('fuelData', JSON.stringify(fuelData));
  localStorage.setItem('budgetData', JSON.stringify(budgetData));
}

// POBIERANIE Z CHMURY
async function syncWithCloud() {
  if (!correctPin) return; // nie pobieraj bez kodu PIN
  try {
    const [fuelRes, budgetRes] = await Promise.all([
      fetch(SCRIPT_URL + '?type=fuel&pin=' + correctPin),
      fetch(SCRIPT_URL + '?type=budget&pin=' + correctPin)
    ]);
    
    if (!fuelRes.ok || !budgetRes.ok) {
      alert("Błąd odpowiedzi HTTP: fuel=" + fuelRes.status + ", budget=" + budgetRes.status);
    }
    
    const [cloudFuel, cloudBudget] = await Promise.all([fuelRes.json(), budgetRes.json()]);

    if (cloudFuel && cloudFuel.status === "error") {
      alert("Błąd z chmury (paliwo): " + cloudFuel.message);
      return;
    }
    if (cloudBudget && cloudBudget.status === "error") {
      alert("Błąd z chmury (budżet): " + cloudBudget.message);
      return;
    }

    const validCloudData = cloudFuel.filter(d => d.id);
    if (validCloudData.length > 0) {
      fuelData = validCloudData.map(d => ({
        id: parseInt(d.id),
        date: d.date ? d.date.split('T')[0] : '',
        time: formatTime(d.time),
        station: d.station || '',
        product: normalizeProduct(d.product),
        liters: parseFloat(d.liters || 0),
        amount: parseFloat(d.amount || 0),
        ppl: parseFloat(d.ppl || 0)
      }));
      nextId = Math.max(...fuelData.map(f => f.id), 0) + 1;
    }

    if (Array.isArray(cloudBudget)) {
      budgetData = cloudBudget.map(b => ({
        month: b.month || '',
        amount: parseFloat(b.amount || 0)
      }));
    }

    saveLocally();
    renderAll();
  } catch (err) {
    alert("Błąd pobierania danych z chmury: " + err.toString());
    console.log("Działamy offline na danych lokalnych.", err);
  }
}

// ---- RENDER ----
function getFiltered() {
  if (activeFilter === 'all') return [...fuelData].reverse();
  return [...fuelData].filter(f => f.product === activeFilter).reverse();
}

function renderStats() {
  const d = fuelData;
  const totalL = d.reduce((a,r) => a + r.liters, 0);
  const totalEUR = d.reduce((a,r) => a + r.amount, 0);
  const avgPpl = totalL > 0 ? totalEUR / totalL : 0;
  const lastPpl = d.length ? d[d.length-1].ppl : 0;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Suma litrów</div>
      <div class="stat-value gold">${totalL.toFixed(2)} L</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Suma EUR</div>
      <div class="stat-value blue">${totalEUR.toFixed(2)} €</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Śr. cena / L</div>
      <div class="stat-value green">${avgPpl.toFixed(3)} €</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ostatnia cena</div>
      <div class="stat-value" style="color:var(--super)">${lastPpl.toFixed(3)} €</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tankowań</div>
      <div class="stat-value">${d.length}</div>
    </div>
  `;
}

function productBadge(p) {
  if (p === 'DIESEL') return `<span class="badge badge-diesel">DIESEL</span>`;
  if (p === 'pb95' || p === 'UNLEADED') return `<span class="badge badge-unleaded">PB95</span>`;
  if (p === 'pb98' || p === 'SUPER UNLEADED') return `<span class="badge badge-super">PB98</span>`;
  return `<span class="badge badge-super">${p}</span>`;
}

function formatDate(d) {
  if(!d) return "";
  const parts = d.split('-');
  if(parts.length !== 3) return d;
  return `${parts[2]}-${parts[1]}-${parts[0].slice(2)}`;
}

function renderTable() {
  const rows = getFiltered();
  document.getElementById('fuel-tbody').innerHTML = rows.map(r => `
    <tr>
      <td>${formatDate(r.date)} <span style="color:var(--muted); font-size:0.85em; margin-left:4px">${r.time||''}</span></td>
      <td>${r.station}</td>
      <td>${productBadge(r.product)}</td>
      <td>${r.liters.toFixed(2)}</td>
      <td><strong>${r.amount.toFixed(2)}</strong></td>
      <td style="color:var(--muted)">${r.ppl.toFixed(3)}</td>
      <td><button class="delete-btn" onclick="deleteFuel(${r.id})">✕</button></td>
    </tr>
  `).join('');
}

function renderBudget() {
  const total = budgetData.reduce((a,r) => a + r.amount, 0);
  const fuelTotal = fuelData.reduce((a,r) => a + r.amount, 0);
  const remaining = total - fuelTotal;
  document.getElementById('budget-summary').innerHTML = `
    <div class="bsum-card">
      <div class="bsum-label">Budżet łącznie</div>
      <div class="bsum-value" style="color:var(--accent)">${total.toFixed(2)} €</div>
    </div>
    <div class="bsum-card">
      <div class="bsum-label">Wydano na paliwo</div>
      <div class="bsum-value" style="color:var(--accent2)">${fuelTotal.toFixed(2)} €</div>
    </div>
    <div class="bsum-card">
      <div class="bsum-label">Pozostało</div>
      <div class="bsum-value" style="color:${remaining >= 0 ? 'var(--green)' : 'var(--red)'}">${remaining.toFixed(2)} €</div>
    </div>
  `;
  document.getElementById('budget-grid').innerHTML = budgetData.map(b => `
    <div class="budget-card">
      <div class="budget-month">${b.month}</div>
      <div class="budget-amount">${b.amount} €</div>
    </div>
  `).join('');
}

function renderAll() { renderStats(); renderTable(); renderBudget(); }

// ---- ACTIONS ----
function deleteFuel(id) {
  if (!confirm('Usunąć ten wpis? Zostanie usunięty lokalnie i z arkusza Google.')) return;
  fuelData = fuelData.filter(f => f.id !== id);
  saveLocally(); renderAll();

  // Usunięcie z Google Sheets w tle
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'delete', id, pin: correctPin })
  }).catch(err => console.log("Błąd usunięcia z chmury:", err));
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function switchPage(p, btn) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  btn.classList.add('active');
}

// ---- MODAL FUEL ----
function openModal() {
  const today = new Date().toISOString().slice(0,10);
  const now = new Date().toTimeString().slice(0,5);
  document.getElementById('f-date').value = today;
  document.getElementById('f-time').value = now;
  document.getElementById('f-station').value = '';
  document.getElementById('f-liters').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-ppl').value = '';
  document.getElementById('fuel-modal').classList.add('open');
}
function closeModal() { document.getElementById('fuel-modal').classList.remove('open'); }

function calcPrice() {
  const l = parseFloat(document.getElementById('f-liters').value);
  const a = parseFloat(document.getElementById('f-amount').value);
  if (l && a) document.getElementById('f-ppl').value = (a/l).toFixed(3);
}
function calcPriceFromAmount() { calcPrice(); }

function saveFuel() {
  const date = document.getElementById('f-date').value;
  const time = document.getElementById('f-time').value;
  const station = document.getElementById('f-station').value.trim();
  const product = document.getElementById('f-product').value;
  const liters = parseFloat(document.getElementById('f-liters').value);
  const amount = parseFloat(document.getElementById('f-amount').value);
  if (!date || !station || !liters || !amount) { alert('Wypełnij wszystkie pola.'); return; }
  const ppl = amount / liters;
  
  const newEntry = { id: nextId++, date, time, station, product, liters, amount, ppl: parseFloat(ppl.toFixed(3)) };
  
  // Zapis lokalnie (natychmiastowy)
  fuelData.push(newEntry);
  fuelData.sort((a,b) => a.date.localeCompare(b.date));
  saveLocally(); 
  renderAll(); 
  closeModal();

  // Wysyłka w tle do Arkusza Google
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ ...newEntry, pin: correctPin })
  }).catch(err => console.log("Błąd synchronizacji z dyskiem:", err));
}

// ---- INICJALIZACJA BUDZETU ----
async function initBudget() {
  if (!confirm('Wpisac domyslny budzet?\n\n11/24-12/24: 2 x 50 EUR\n01/25-04/26: 16 x 100 EUR\n\nIstniejace miesiace zostana nadpisane.')) return;
  const entries = [
    { month: '11/24', amount: 50 }, { month: '12/24', amount: 50 },
    { month: '01/25', amount: 100 }, { month: '02/25', amount: 100 },
    { month: '03/25', amount: 100 }, { month: '04/25', amount: 100 },
    { month: '05/25', amount: 100 }, { month: '06/25', amount: 100 },
    { month: '07/25', amount: 100 }, { month: '08/25', amount: 100 },
    { month: '09/25', amount: 100 }, { month: '10/25', amount: 100 },
    { month: '11/25', amount: 100 }, { month: '12/25', amount: 100 },
    { month: '01/26', amount: 100 }, { month: '02/26', amount: 100 },
    { month: '03/26', amount: 100 }, { month: '04/26', amount: 100 },
  ];
  entries.forEach(e => {
    const existing = budgetData.find(b => b.month === e.month);
    if (existing) existing.amount = e.amount;
    else budgetData.push({ month: e.month, amount: e.amount });
  });
  saveLocally();
  renderBudget();
  for (const e of entries) {
    await fetch(SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'budget', month: e.month, amount: e.amount, pin: correctPin })
    }).catch(err => console.log("Blad sync budzetu:", err));
  }
  alert('Budzet zainicjowany i wyslany do Google Sheets!');
}

// ---- MODAL BUDGET ----
function openBudgetModal() {
  document.getElementById('b-month').value = '';
  document.getElementById('b-amount').value = '';
  document.getElementById('budget-modal').classList.add('open');
}
function closeBudgetModal() { document.getElementById('budget-modal').classList.remove('open'); }

function saveBudget() {
  const month = document.getElementById('b-month').value.trim();
  const amount = parseFloat(document.getElementById('b-amount').value);
  if (!month || !amount) { alert('Wypełnij wszystkie pola.'); return; }
  if (!/^\d{2}\/\d{2}$/.test(month)) { alert('Nieprawidłowy format miesiąca. Użyj MM/RR, np. 05/26.'); return; }
  const existing = budgetData.find(b => b.month === month);
  if (existing) existing.amount = amount;
  else budgetData.push({ month, amount });
  saveLocally(); renderBudget(); closeBudgetModal();

  // Sync do Sheets w tle
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'budget', month, amount, pin: correctPin })
  }).catch(err => console.log("Błąd sync budżetu:", err));
}

// ---- CLOSE ON OVERLAY CLICK ----
document.getElementById('fuel-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('budget-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeBudgetModal(); });

// Start UI natychmiast z danych lokalnych
renderAll();
// Oraz odpal automatyczną synchronizację
syncWithCloud();
</script>
